# =============================================================================
# PanicMode: Main Configuration
# =============================================================================
#
# This file defines WHAT to monitor and WHEN to react.
#
# Documentation: https://github.com/BorisYamp/panicmode
# =============================================================================

# -----------------------------------------------------------------------------
# Storage (SQLite incidents database, snapshots, logs)
# -----------------------------------------------------------------------------
# PanicMode writes every fired incident to an SQLite database so you can
# query the history after the fact.  All paths are created automatically.
storage:
  # SQLite database for incident history (post-mortem analysis)
  incident_db: /var/lib/panicmode/incidents.db

  # Directory for system snapshots (ps, ss, free, df dumps on incident)
  snapshot_dir: /var/log/panicmode/snapshots

  # Directory for rolling daily log files
  log_dir: /var/log/panicmode

  # JSON file for persisting deduplication state across restarts.
  # Ensures PanicMode remembers recent incidents even after a quick restart.
  state_file: /var/lib/panicmode/incident_state.json

# -----------------------------------------------------------------------------
# PanicMode self-performance limits
# -----------------------------------------------------------------------------
performance:
  # Maximum CPU usage (%)
  cpu_limit: 5.0

  # Maximum memory usage (MB)
  memory_limit_mb: 50

  # Metric collection interval (recommended: 5-10s)
  check_interval: 5s

# -----------------------------------------------------------------------------
# Anomaly Detector thresholds
# -----------------------------------------------------------------------------
# These thresholds are used by the built-in anomaly detector (anomaly.rs),
# which runs in parallel with the monitor rules.
# The anomaly detector catches extreme situations not covered by explicit rules.
anomaly:
  # CPU: fires when cpu_usage >= threshold (no additional conditions)
  cpu_spike_threshold: 95.0

  # Memory: fires when memory_usage >= threshold AND swap > 50%
  memory_spike_threshold: 95.0

  # Connections: fires when active_connections > threshold
  connection_spike_threshold: 10000

  # Suspicious IPs: fires when the count of suspicious IPs >= threshold
  suspicious_ip_threshold: 3

  # Connections from a single IP to mark it as "suspicious"
  # An IP is suspicious if it has >= suspicious_connections_per_ip connections
  suspicious_connections_per_ip: 50

  # Load average: fires when load_avg_1m >= threshold
  # (independent of CPU — catches I/O-bound overload)
  # Recommended: number of cores × 2
  high_load_threshold: 10.0

# -----------------------------------------------------------------------------
# HTTP API (healthcheck endpoint)
# -----------------------------------------------------------------------------
# Minimal HTTP server for integration with load balancers and monitoring systems.
# GET /health → 200 {"status":"ok","uptime_secs":N}
# Any other path → 404
http_api:
  enabled: false                  # Set to true to enable
  bind: "127.0.0.1:8765"          # Localhost only by default

# -----------------------------------------------------------------------------
# Monitors (problem detection rules)
# -----------------------------------------------------------------------------
monitors:
  # === CPU MONITORING ===

  - name: "Critical CPU Overload"
    type: cpu_usage
    threshold: 95
    actions:
      - mass_freeze
      - snapshot
      - alert_critical
    enabled: true

  - name: "High CPU Usage"
    type: cpu_usage
    threshold: 80
    actions:
      - mass_freeze_top
      - alert_warning
    enabled: true

  # === MEMORY MONITORING ===

  - name: "Critical Memory Usage"
    type: memory_usage
    threshold: 95
    actions:
      - mass_freeze
      - snapshot
      - alert_critical
    enabled: true

  - name: "High Memory Usage"
    type: memory_usage
    threshold: 85
    actions:
      - alert_warning
    enabled: true

  # === DISK MONITORING ===

  - name: "Disk Almost Full"
    type: disk_usage
    threshold: 90
    actions:
      - snapshot
      - alert_critical
    enabled: true

  # === NETWORK MONITORING ===

  - name: "High Connection Rate"
    type: connection_rate
    threshold: 10000
    actions:
      - rate_limit
      - alert_warning
    enabled: true

  # === SECURITY MONITORING ===

  - name: "SSH Brute Force Attack"
    type: auth_failures
    threshold: 20
    window: 60s
    actions:
      - block_ip
      - alert_critical
    enabled: true

  - name: "Mass SSH Failures"
    type: auth_failures
    threshold: 100
    actions:
      - mass_freeze
      - snapshot
      - alert_critical
    enabled: true

  # === FILE MONITORING ===

  - name: "Config File Changes"
    type: file_monitor
    threshold: 1
    paths:
      - /etc/nginx/nginx.conf
      - /etc/ssh/sshd_config
      - /etc/systemd/system
    actions:
      - snapshot
      - alert_warning
    enabled: true

  # === SWAP MONITORING ===

  - name: "High Swap Usage"
    type: swap_usage
    threshold: 70
    actions:
      - alert_warning
    enabled: true

  - name: "Critical Swap Usage"
    type: swap_usage
    threshold: 90
    actions:
      - snapshot
      - alert_critical
    enabled: true

  # === LOAD AVERAGE MONITORING ===
  # Recommended: threshold = number of CPU cores × 1.5 (warning)
  # and × 3.0 (critical)

  - name: "High Load Average"
    type: load_average
    threshold: 4.0
    actions:
      - alert_warning
    enabled: true

  - name: "Critical Load Average"
    type: load_average
    threshold: 8.0
    actions:
      - freeze_top_process
      - alert_critical
    enabled: true

  # === DISK I/O MONITORING ===

  - name: "High Disk I/O"
    type: disk_io
    threshold: 80
    actions:
      - alert_warning
    enabled: true

  - name: "Disk I/O Saturated"
    type: disk_io
    threshold: 95
    actions:
      - snapshot
      - alert_critical
    enabled: true

  # === CLUSTER-SPECIFIC ===

  - name: "Website Cluster Overload"
    type: cpu_usage
    threshold: 90
    actions:
      - mass_freeze_cluster:website
      - alert_warning
    enabled: true

  # === CUSTOM METRICS ===

  - name: "Redis Memory High"
    type: custom
    threshold: 1000000000   # 1 GB in bytes
    actions:
      - alert_warning
    enabled: true

# -----------------------------------------------------------------------------
# Actions (custom scripts)
# -----------------------------------------------------------------------------
actions:
  block_malicious:
    type: script
    action: /opt/panicmode/scripts/block_ip.sh

  clear_cache:
    type: script
    action: /opt/panicmode/scripts/clear_cache.sh

  emergency_backup:
    type: script
    action: /opt/panicmode/scripts/backup.sh

# -----------------------------------------------------------------------------
# Alerts (notification channels)
# -----------------------------------------------------------------------------
alerts:
  critical:
    - channel: twilio_call
      contacts:
        - name: "On-Call Admin"
          phone: "+1234567890"
          retries: 3
          timeout: 120s
        - name: "Backup Admin"
          phone: "+0987654321"
          retries: 2
          timeout: 120s
    - channel: telegram
    - channel: email

  warning:
    - channel: telegram
    - channel: discord
      webhook_url: "https://discord.com/api/webhooks/YOUR_WEBHOOK"
    - channel: ntfy

  info:
    - channel: ntfy

# -----------------------------------------------------------------------------
# Integrations (external services)
# -----------------------------------------------------------------------------
integrations:
  telegram:
    enabled: true
    bot_token: "YOUR_BOT_TOKEN"
    chat_id: "YOUR_CHAT_ID"

  discord:
    enabled: true
    webhook_url: "https://discord.com/api/webhooks/YOUR_WEBHOOK"

  ntfy:
    enabled: true
    server: "https://ntfy.sh"
    topic: "panicmode-alerts"
    token: null   # optional, for private topics

  email:
    enabled: true
    smtp_host: "smtp.gmail.com"
    smtp_port: 587
    smtp_username: "your-email@gmail.com"
    smtp_password: "your-app-password"
    from_email: "panicmode@yourserver.com"
    to_email: "admin@yourcompany.com"
    use_tls: true

  # Twilio (phone calls + SMS)
  twilio:
    enabled: true
    account_sid: "YOUR_ACCOUNT_SID"
    auth_token: "YOUR_AUTH_TOKEN"
    from_number: "+1234567890"

# -----------------------------------------------------------------------------
# Custom Metrics (user-defined metrics)
# -----------------------------------------------------------------------------
custom_metrics:
  redis_memory:
    command: "redis-cli INFO memory | grep used_memory: | awk -F: '{print $2}'"
    timeout: 5s
    cache_ttl: 30s
    output_format: number

  queue_length:
    command: "/opt/scripts/check_queue.sh"
    timeout: 10s
    cache_ttl: 60s
    output_format: json   # Expects {"value": 123}

  app_health:
    command: "curl -s localhost:8080/health | jq .score"
    timeout: 5s
    cache_ttl: 10s
    output_format: number

# -----------------------------------------------------------------------------
# File Monitor
# -----------------------------------------------------------------------------
file_monitor:
  max_events_per_path: 1000
  aggregation_window: 60s

# -----------------------------------------------------------------------------
# Circuit Breakers (for action execution)
# -----------------------------------------------------------------------------
circuit_breakers:
  max_failures: 5
  failure_window: 60s
  open_duration: 30s
  max_concurrency: 5
  timeout: 10s
