# Path: examples/mass_freeze.yaml
# =============================================================================
# PanicMode: Mass Freeze Configuration
# =============================================================================
#
# This file defines HOW to perform mass process freezing.
# Edit it to match your infrastructure!
#
# Documentation: https://github.com/BorisYamp/panicmode
# =============================================================================

# -----------------------------------------------------------------------------
# Mass freeze operation mode
# -----------------------------------------------------------------------------
# Defines the strategy for selecting processes to freeze.
#
# Available modes:
#   all      - Freeze EVERYTHING except whitelist (emergency "nuclear button")
#   top_cpu  - Freeze the N most CPU-hungry processes
#   cluster  - Freeze a specific group of related processes
#
# Default: all
mode: all

# -----------------------------------------------------------------------------
# Settings for mode: top_cpu
# -----------------------------------------------------------------------------
# Applied only when mode: top_cpu
top_cpu:
  # Number of processes to freeze (top by CPU usage)
  # Processes are sorted by CPU usage in descending order, first N are taken
  count: 5

  # Minimum CPU usage to freeze (optional)
  # A process with CPU < min_cpu_percent won't be frozen even if it's in the top N
  # min_cpu_percent: 10.0

# -----------------------------------------------------------------------------
# Settings for mode: cluster
# -----------------------------------------------------------------------------
# Applied only when mode: cluster
cluster:
  # Cluster detection method:
  #
  #   manual - Manually define process groups (RECOMMENDED)
  #            Works everywhere, full control
  #
  #   cgroup - Automatically from systemd cgroups (Linux with systemd only)
  #            Automatic service boundary detection
  #
  # Default: manual
  detection: manual

  # ---------------------------------------------------------------------------
  # For detection: manual
  # ---------------------------------------------------------------------------
  # Define logical groups (clusters) of processes on your server.
  # Each cluster is a set of process names.
  # A process is added to a cluster if its name CONTAINS one of the listed words.
  #
  # Format:
  #   cluster_name:
  #     - process_name_1
  #     - process_name_2
  #
  # Example usage in monitor:
  #   actions:
  #     - mass_freeze_cluster:website
  definitions:
    # "website" cluster — main company website
    # Typical LAMP/LEMP stack
    website:
      - nginx           # Web server
      - php-fpm         # PHP processor
      - mysqld          # MySQL database
      - apache2         # nginx alternative

    # "crm" cluster — internal CRM system
    # Modern Node.js + Redis + PostgreSQL stack
    crm:
      - node            # Node.js backend (be careful — there may be many!)
      - redis-server    # Cache/queues
      - postgres        # PostgreSQL database

    # "api" cluster — microservice architecture
    # Use this if you have a dedicated API layer
    api:
      - gunicorn        # Python WSGI server
      - celery          # Task queue workers
      - rabbitmq        # Message broker

    # "monitoring" cluster — monitoring systems
    # NOTE: Usually you do NOT want to freeze this, keep it running!
    monitoring:
      - prometheus
      - grafana-server
      - node_exporter
      - alertmanager

    # "docker" cluster — containerized applications
    # Use if you run services in Docker
    docker:
      - dockerd
      - containerd
      - docker-proxy

    # -------------------------------------------------------------------------
    # Add your own clusters below
    # -------------------------------------------------------------------------
    #
    # my_app:
    #   - my-service-name
    #   - my-worker-process
    #   - my-database
    #
    # payment_system:
    #   - payment-gateway
    #   - stripe-webhook
    #   - transaction-processor

  # ---------------------------------------------------------------------------
  # For detection: cgroup
  # ---------------------------------------------------------------------------
  # Mapping of friendly names to systemd service names
  # Allows using short names instead of full service names
  #
  # Format:
  #   alias_name: service_name.service
  #
  # Example usage:
  #   actions:
  #     - mass_freeze_cluster:webserver  # instead of nginx.service
  service_aliases:
    webserver: nginx.service
    database: postgresql.service
    cache: redis.service
    webapp: my-app.service

    # Add your own mappings:
    # backend: my-backend.service
    # frontend: my-frontend.service

# -----------------------------------------------------------------------------
# Whitelist — processes that are NEVER frozen
# -----------------------------------------------------------------------------
# Applied to ALL modes after the main filtering pass.
# Even if a process ends up in the CPU top or in a cluster, the whitelist saves it.
#
# NOTE: In addition to this list, the following are ALWAYS protected (hardcoded):
#   - All root processes
#   - Processes with "sshd" in the name (critical for remote access!)
#   - PanicMode's own process
#   - Parent processes up to init/systemd
whitelist_processes:
  # ===== CRITICAL: DO NOT REMOVE! =====

  # SSH daemon — WITHOUT THIS YOU WILL LOSE REMOTE ACCESS!
  - sshd

  # PanicMode itself (do not freeze!)
  - panicmode

  # ===== SYSTEM SERVICES =====

  # Monitoring (to see what is happening)
  - prometheus
  - node_exporter
  - grafana-server
  - collectd
  - telegraf

  # Logging (to preserve incident logs)
  - rsyslogd
  - journald
  - fluentd
  - logstash

  # ===== BUSINESS-CRITICAL =====

  # Add processes that must ALWAYS be running:
  #
  # - payment-processor    # Payment system
  # - backup-daemon        # Backups
  # - critical-api         # Critical API

  # ===== YOUR WHITELIST =====

  # Examples (uncomment and adapt):
  # - nginx                # If the web server must always be up
  # - postgres             # If the database is always critical
  # - redis-server         # If the cache is critical

# -----------------------------------------------------------------------------
# Advanced settings (optional)
# -----------------------------------------------------------------------------

# Freeze operation timeout (protection against hanging)
# If freezing all processes takes longer than this, abort
# freeze_timeout: 30s

# Maximum number of processes to freeze at once
# Protection against accidentally freezing thousands of processes
# max_processes_to_freeze: 1000

# Dry-run mode (only show what would be frozen, do not actually freeze)
# Useful for testing the configuration
# dry_run: false

# -----------------------------------------------------------------------------
# Usage examples in config.yaml
# -----------------------------------------------------------------------------
#
# monitors:
#   # Example 1: Total freeze on critical overload
#   - name: "Total System Overload"
#     type: cpu_usage
#     threshold: 99
#     actions:
#       - mass_freeze              # Uses mode from mass_freeze.yaml
#       - snapshot
#       - alert_critical
#
#   # Example 2: Targeted freeze of top CPU processes
#   - name: "High CPU from Multiple Processes"
#     type: cpu_usage
#     threshold: 95
#     actions:
#       - mass_freeze_top          # top_cpu mode
#       - alert_warning
#
#   # Example 3: Freeze a specific cluster
#   - name: "Website CPU Spike"
#     type: cpu_usage
#     threshold: 90
#     actions:
#       - mass_freeze_cluster:website   # Only the website cluster
#       - alert_warning
#
#   # Example 4: Freeze on suspected intrusion
#   - name: "Suspicious Activity"
#     type: auth_failures
#     threshold: 50
#     actions:
#       - mass_freeze              # Freeze everything
#       - snapshot                 # Take a snapshot for forensics
#       - alert_critical           # Notify immediately

# -----------------------------------------------------------------------------
# Recovery after freeze
# -----------------------------------------------------------------------------
#
# IMPORTANT: There is NO automatic unfreeze!
# Processes remain frozen until you manually unfreeze them.
#
# To unfreeze:
#   1. Connect via SSH:
#      ssh admin@your-server
#
#   2. Unfreeze processes:
#      # Unfreeze everything:
#      sudo /usr/local/bin/panicmode-unfreeze
#
#      # Unfreeze a specific mode/cluster:
#      sudo /usr/local/bin/panicmode-unfreeze all
#      sudo /usr/local/bin/panicmode-unfreeze top_cpu
#      sudo /usr/local/bin/panicmode-unfreeze website
#
#   3. Check the system state before unfreezing!
#      top                # Current load
#      ps aux            # Process list
#      journalctl -xe    # System logs
#
# State files (information about frozen processes):
#   /tmp/panicmode_frozen_all.state        # For mode: all
#   /tmp/panicmode_frozen_top_cpu.state    # For mode: top_cpu
#   /tmp/panicmode_frozen_website.state    # For cluster: website

# -----------------------------------------------------------------------------
# Warnings
# -----------------------------------------------------------------------------
#
# ⚠️  WARNING: Mass Freeze is an emergency measure!
#
# What happens when you freeze:
#   - Web servers will stop responding to requests
#   - Databases will stop processing transactions
#   - Applications will appear "hung" to users
#   - System services (root) will continue running
#   - SSH access is preserved (critical!)
#
# Use only when:
#   ✓ Critical system overload (CPU 99%, Memory 99%)
#   ✓ Suspected intrusion or malicious code
#   ✓ Application-level DDoS attack
#   ✓ A runaway process is consuming all resources
#   ✓ Other measures have not helped
#
# Do NOT use for:
#   ✗ Planned maintenance (use softer approaches)
#   ✗ Normal load spikes (configure autoscaling instead)
#   ✗ Testing (use dry_run: true)
