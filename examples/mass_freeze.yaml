/// Path: PanicMode/exampels/mass_freeze.yaml
# =============================================================================
# PanicMode: Mass Freeze Configuration
# =============================================================================
# 
# This file defines HOW to perform a mass process freeze.
# Edit it to match your infrastructure!
#
# Documentation: https://github.com/BorisYamp/panicmode
# =============================================================================

# -----------------------------------------------------------------------------
# Mass freeze mode
# -----------------------------------------------------------------------------
# Defines the strategy for selecting processes to freeze.
#
# Available modes:
#   all      - Freeze EVERYTHING except the whitelist (emergency "nuclear button")
#   top_cpu  - Freeze the N most CPU-hungry processes
#   cluster  - Freeze a specific named group of related processes
#
# Default: all
mode: all

# -----------------------------------------------------------------------------
# Settings for mode: top_cpu
# -----------------------------------------------------------------------------
# Applied only when mode: top_cpu
top_cpu:
  # Number of processes to freeze (top by CPU usage)
  # Processes are sorted by CPU usage descending; the first N are taken
  count: 5

  # Minimum CPU usage required to freeze (optional)
  # A process with CPU < min_cpu_percent will not be frozen even if in the top list
  # min_cpu_percent: 10.0

# -----------------------------------------------------------------------------
# Settings for mode: cluster
# -----------------------------------------------------------------------------
# Applied only when mode: cluster
cluster:
  # Method for determining clusters:
  #
  #   manual - Manually describe process groups (RECOMMENDED)
  #            Works everywhere, full control
  #
  #   cgroup - Automatically from systemd cgroups (Linux with systemd only)
  #            Automatic detection of service boundaries
  #
  # Default: manual
  detection: manual

  # ---------------------------------------------------------------------------
  # For detection: manual
  # ---------------------------------------------------------------------------
  # Describe the logical groups (clusters) of processes on your server.
  # Each cluster is a set of process names.
  # A process belongs to a cluster if its name CONTAINS one of the listed words.
  #
  # Format:
  #   cluster_name:
  #     - process_name_1
  #     - process_name_2
  #
  # Usage in a monitor:
  #   actions:
  #     - mass_freeze_cluster:website
  definitions:
    # Cluster "website" — main company website (typical LAMP/LEMP stack)
    website:
      - nginx           # Web server
      - php-fpm         # PHP handler
      - mysqld          # MySQL database
      - apache2         # Alternative to nginx

    # Cluster "crm" — internal CRM (Node.js + Redis + PostgreSQL stack)
    crm:
      - node            # Node.js backend (be careful — may have many processes!)
      - redis-server    # Cache / queues
      - postgres        # PostgreSQL database

    # Cluster "api" — microservice API layer
    api:
      - gunicorn        # Python WSGI server
      - celery          # Task queue workers
      - rabbitmq        # Message broker

    # Cluster "monitoring" — monitoring systems
    # NOTE: Usually do NOT freeze these — keep them running!
    monitoring:
      - prometheus
      - grafana-server
      - node_exporter
      - alertmanager

    # Cluster "docker" — containerised applications
    docker:
      - dockerd
      - containerd
      - docker-proxy

    # -------------------------------------------------------------------------
    # Add your own clusters below
    # -------------------------------------------------------------------------
    #
    # my_app:
    #   - my-service-name
    #   - my-worker-process
    #   - my-database
    #
    # payment_system:
    #   - payment-gateway
    #   - stripe-webhook
    #   - transaction-processor

  # ---------------------------------------------------------------------------
  # For detection: cgroup
  # ---------------------------------------------------------------------------
  # Mapping of friendly names to systemd service names.
  # Lets you use short names instead of full service names.
  #
  # Format:
  #   alias_name: service_name.service
  #
  # Usage:
  #   actions:
  #     - mass_freeze_cluster:webserver  # instead of nginx.service
  service_aliases:
    webserver: nginx.service
    database: postgresql.service
    cache: redis.service
    webapp: my-app.service

    # Add your own mappings:
    # backend: my-backend.service
    # frontend: my-frontend.service

# -----------------------------------------------------------------------------
# Whitelist — processes that are NEVER frozen
# -----------------------------------------------------------------------------
# Applied for ALL modes after the main filtering step.
# Even if a process ends up in the top-CPU list or in a cluster — the whitelist saves it.
#
# IMPORTANT: In addition to this list, the following are always protected (hardcoded):
#   - All root processes
#   - Processes with "sshd" in their name (critical for remote access!)
#   - PanicMode's own process
#   - Parent processes up to init/systemd
whitelist_processes:
  # ===== CRITICAL: DO NOT REMOVE! =====

  # SSH daemon — WITHOUT THIS YOU WILL LOSE REMOTE ACCESS!
  - sshd

  # PanicMode itself (do not freeze!)
  - panicmode

  # ===== SYSTEM SERVICES =====

  # Monitoring (so you can see what is happening)
  - prometheus
  - node_exporter
  - grafana-server
  - collectd
  - telegraf

  # Logging (so incident logs are not lost)
  - rsyslogd
  - journald
  - fluentd
  - logstash

  # ===== BUSINESS-CRITICAL =====

  # Add processes that must ALWAYS keep running:
  #
  # - payment-processor    # Payment system
  # - backup-daemon        # Backup daemon
  # - critical-api         # Critical API

  # ===== YOUR WHITELIST =====

  # Examples (uncomment and adapt):
  # - nginx                # If the web server must always run
  # - postgres             # If the database is always critical
  # - redis-server         # If the cache is critical

# -----------------------------------------------------------------------------
# Advanced settings (optional)
# -----------------------------------------------------------------------------

# Freeze operation timeout (protection against hanging)
# If freezing all processes takes longer than this — abort
# freeze_timeout: 30s

# Maximum number of processes to freeze at once
# Protection against accidentally freezing thousands of processes
# max_processes_to_freeze: 1000

# Dry-run mode (only show what would be frozen, do not actually freeze)
# Useful for testing the configuration
# dry_run: false

# -----------------------------------------------------------------------------
# Usage examples in config.yaml
# -----------------------------------------------------------------------------
#
# monitors:
#   # Example 1: Total freeze on critical overload
#   - name: "Total System Overload"
#     type: cpu_usage
#     threshold: 99
#     actions:
#       - mass_freeze              # Uses mode from mass_freeze.yaml
#       - snapshot
#       - alert_critical
#
#   # Example 2: Targeted freeze of top CPU processes
#   - name: "High CPU from Multiple Processes"
#     type: cpu_usage
#     threshold: 95
#     actions:
#       - mass_freeze_top          # top_cpu mode
#       - alert_warning
#
#   # Example 3: Freeze a specific cluster
#   - name: "Website CPU Spike"
#     type: cpu_usage
#     threshold: 90
#     actions:
#       - mass_freeze_cluster:website   # website cluster only
#       - alert_warning
#
#   # Example 4: Freeze on suspected intrusion
#   - name: "Suspicious Activity"
#     type: auth_failures
#     threshold: 50
#     actions:
#       - mass_freeze              # Freeze everything
#       - snapshot                 # Capture snapshot for forensics
#       - alert_critical           # Alert immediately

# -----------------------------------------------------------------------------
# Recovery after a freeze
# -----------------------------------------------------------------------------
#
# IMPORTANT: There is NO automatic unfreeze!
# Processes remain frozen until you manually unfreeze them.
#
# To unfreeze:
#   1. Connect via SSH:
#      ssh admin@your-server
#
#   2. Unfreeze processes:
#      # Unfreeze everything:
#      sudo /usr/local/bin/panicmode-unfreeze
#
#      # Unfreeze a specific mode/cluster:
#      sudo /usr/local/bin/panicmode-unfreeze all
#      sudo /usr/local/bin/panicmode-unfreeze top_cpu
#      sudo /usr/local/bin/panicmode-unfreeze website
#
#   3. Check system state before unfreezing!
#      top                # Current load
#      ps aux             # Process list
#      journalctl -xe     # System logs
#
# State files (information about frozen processes):
#   /tmp/panicmode_frozen_all.state        # For mode: all
#   /tmp/panicmode_frozen_top_cpu.state    # For mode: top_cpu
#   /tmp/panicmode_frozen_website.state    # For cluster: website

# -----------------------------------------------------------------------------
# Warnings
# -----------------------------------------------------------------------------
#
# ⚠️  WARNING: Mass Freeze is an emergency measure!
#
# What happens when you freeze:
#   - Web servers stop responding to requests
#   - Databases stop processing transactions
#   - Applications "hang" for users
#   - System services (root) continue running
#   - SSH access is preserved (critical!)
#
# Use only when:
#   ✓ Critical system overload (CPU 99%, Memory 99%)
#   ✓ Suspected intrusion / malicious code
#   ✓ Application-layer DDoS attack
#   ✓ A runaway process is consuming all resources
#   ✓ Other measures have not helped
#
# Do NOT use for:
#   ✗ Planned maintenance (there are gentler approaches)
#   ✗ Normal load (configure autoscaling instead)
#   ✗ Testing (use dry_run: true)