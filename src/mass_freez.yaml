# =============================================================================
# PanicMode: Mass Freeze Configuration
# =============================================================================
#
# This file defines HOW to perform a mass process freeze.
# Copy to /etc/panicmode/mass_freeze.yaml and adapt as needed.
#
# Relation to config.yaml:
#   mass_freeze            → freeze EVERYTHING except whitelist (this file)
#   mass_freeze_top        → freeze top N by CPU (setting below)
#   mass_freeze_cluster:X  → freeze cluster X (defined below)
# =============================================================================

# -----------------------------------------------------------------------------
# mass_freeze_top settings
# -----------------------------------------------------------------------------
# How many processes to freeze in mass_freeze_top mode
top_cpu:
  count: 5

# -----------------------------------------------------------------------------
# Process clusters
# -----------------------------------------------------------------------------
# A cluster is a logical group of processes.
# A process belongs to a cluster if its name CONTAINS one of the listed words.
#
# Usage in config.yaml:
#   actions:
#     - mass_freeze_cluster:website
#
# The user manually defines which processes belong to which cluster.
clusters:
  # Типичный LAMP/LEMP stack
  website:
    - nginx
    - php-fpm
    - mysqld
    - apache2

  # Node.js stack
  crm:
    - node
    - redis-server
    - postgres

  # Python API
  api:
    - gunicorn
    - celery
    - rabbitmq

  # Docker
  docker:
    - dockerd
    - containerd
    - docker-proxy

  # Add your own clusters:
  # my_app:
  #   - my-service
  #   - my-worker

# -----------------------------------------------------------------------------
# Whitelist — NEVER freeze these
# -----------------------------------------------------------------------------
# Applied to ALL modes (mass_freeze, mass_freeze_top, cluster).
#
# In addition to this list, the following are always protected (hardcoded):
#   - All root processes
#   - sshd (critical for remote access!)
#   - panicmode (itself)
#   - systemd, init, journald
whitelist:
  # Monitoring (so you can see what is happening)
  - prometheus
  - node_exporter
  - grafana-server
  - telegraf

  # Logging (so incident logs are not lost)
  - rsyslogd
  - fluentd

  # Add your own critical processes:
  # - payment-processor
  # - backup-daemon

# =============================================================================
# Recovery after a freeze
# =============================================================================
#
# ⚠️  Frozen processes are NOT unfrozen automatically!
#
# 1. Connect via SSH (sshd is protected — it keeps running)
# 2. Unfreeze:
#      sudo panicmode-unfreeze            # everything
#      sudo panicmode-unfreeze website    # a specific cluster
#    or manually:
#      sudo kill -CONT <pid>
#
# 3. Check system state:
#      top
#      ps aux | grep T    # processes in "stopped" state
# =============================================================================